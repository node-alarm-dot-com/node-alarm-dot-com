name: Node-CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [released]

jobs:
  build:
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm install, build # and test
        run: |
          npm ci
          npm run build
          # We don't have tests
          # npm test
        env:
          CI: true

  publish-npm:
    # publish only if we are on our own repo
    if: github.repository == 'node-alarm-dot-com/node-alarm-dot-com' && github.event_name == 'release'
    needs: build # only run if build succeeds
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # use the minimum required version
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - run: npm ci

      - run: NODE_AUTH_TOKEN="" npm publish
